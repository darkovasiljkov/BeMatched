<header
  class="fixed top-0 left-0 right-0 z-50 px-6 py-3">
  
  <div
    class="mx-auto flex max-w-7xl items-center gap-6 rounded-3xl border border-white/10 bg-black/40 px-8 py-3 backdrop-blur-xl shadow-2xl">

    <a
      routerLink="/"
      class="group flex items-center gap-3 pr-6 transition-all duration-300 hover:scale-[1.03]">

      <div
        class="flex h-11 w-11 items-center justify-center rounded-2xl bg-white/10 transition-all duration-300 group-hover:bg-white/20 group-hover:shadow-lg group-hover:shadow-white/10">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="size-7 text-white transition-transform duration-300 group-hover:rotate-6">
          <path
            d="M4.913 2.658c2.075-.27 4.19-.408 6.337-.408 2.147 0 4.262.139 6.337.408 1.922.25 3.291 1.861 3.405 3.727a4.403 4.403 0 0 0-1.032-.211 50.89 50.89 0 0 0-8.42 0c-2.358.196-4.04 2.19-4.04 4.434v4.286a4.47 4.47 0 0 0 2.433 3.984L7.28 21.53A.75.75 0 0 1 6 21v-4.03a48.527 48.527 0 0 1-1.087-.128C2.905 16.58 1.5 14.833 1.5 12.862V6.638c0-1.97 1.405-3.718 3.413-3.979Z" />
          <path
            d="M15.75 7.5c-1.376 0-2.739.057-4.086.169C10.124 7.797 9 9.103 9 10.609v4.285c0 1.507 1.128 2.814 2.67 2.94 1.243.102 2.5.157 3.768.165l2.782 2.781a.75.75 0 0 0 1.28-.53v-2.39l.33-.026c1.542-.125 2.67-1.433 2.67-2.94v-4.286c0-1.505-1.125-2.811-2.664-2.94A49.392 49.392 0 0 0 15.75 7.5Z" />
        </svg>
      </div>

      <h3
        class="text-2xl font-black tracking-tight text-white">
        BeMatched.
      </h3>
    </a>

    <nav class="flex items-center gap-4">
      @if (accountService.currentUser())
      {
      <a
        routerLink="/members"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="{exact: true}"
        class="nav-link">
        Matches
      </a>

      <a
        routerLink="/lists"
        routerLinkActive="nav-active"
        class="nav-link">
        Lists
      </a>

      <a
        routerLink="/messages"
        routerLinkActive="nav-active"
        class="nav-link">
        Messages
      </a>

        <a
        routerLink="/errors"
        routerLinkActive="nav-active"
        class="nav-link">
        Errors
      </a>
      }

    </nav>

    @if (busyService.busyRequestCount() > 0) {
      <span class="loading loading-spinner text-accent"></span>
    }
    
    <div class="ml-auto flex items-center gap-3">

      @if (accountService.currentUser(); as user)
      {
      <div class="dropdown dropdown-end">

        <div
          tabindex="0"
          role="button"
          class="group flex cursor-pointer items-center gap-3 rounded-2xl px-3 py-2 transition-all duration-300 hover:bg-white/10">

          <img
            [src]="user?.imageUrl || '/user.png'"
            alt="user avatar"
            class="h-10 w-10 rounded-full border border-white/20">

          <span class="text-lg font-medium text-white">
            {{user.displayName}}
          </span>
        </div>

        <ul
          tabindex="-1"
          class="dropdown-content menu z-10 mt-3 w-56 rounded-2xl border border-white/10 bg-zinc-900/95 p-2 text-white shadow-2xl backdrop-blur-xl">

          <li>
            <a routerLink="/members/{{user.id}}" class="rounded-xl hover:bg-white/10">
              Edit profile
            </a>
          </li>

          <li>
            <a
              (click)="logout()"
              class="rounded-xl hover:bg-red-500/20">
              Logout
            </a>
          </li>
        </ul>

      </div>
      }
      @else
      {
      <form
        #loginForm="ngForm"
        (ngSubmit)="login()"
        class="flex items-center gap-3">

        <input
          [(ngModel)]="creds.email"
          name="email"
          type="text"
          placeholder="Email"
          class="input-modern" />

        <input
          [(ngModel)]="creds.password"
          name="password"
          type="password"
          placeholder="Password"
          class="input-modern" />

        <button
          type="submit"
          class="btn-modern cursor-pointer">
          Login
        </button>

      </form>
      }
      <label class="swap swap-rotate cursor-pointer">
        <!-- this hidden checkbox controls the state -->
        <input type="checkbox" class="theme-controller" value="synthwave" />

        <!-- sun icon -->
        <svg
          class="swap-off h-6 w-6 fill-current"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24">
          <path
            d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z" />
        </svg>
        <!-- moon icon -->
        <svg
          class="swap-on h-6 w-6 fill-current"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24">
          <path
            d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
        </svg>
      </label>
    </div>
  </div>
</header>
